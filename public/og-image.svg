<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#060a12;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d1424;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e5af43;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#d4952a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#edc975;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Gold border -->
  <rect x="20" y="20" width="1160" height="590" fill="none" stroke="url(#gold)" stroke-width="2" rx="8"/>
  <!-- Restaurant name -->
  <text x="600" y="200" text-anchor="middle" font-family="Georgia, serif" font-size="72" font-weight="bold" fill="white">The ANNEX</text>
  <text x="600" y="260" text-anchor="middle" font-family="Georgia, serif" font-size="28" fill="#e5af43" letter-spacing="8">RESTAURANT &amp; LOUNGE</text>
  <!-- Divider -->
  <line x1="450" y1="290" x2="750" y2="290" stroke="#e5af43" stroke-width="1.5"/>
  <!-- Tagline -->
  <text x="600" y="340" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" fill="#faf3e0" opacity="0.8">Made From Scratch. Crafted With Care.</text>
  <!-- Rating -->
  <text x="600" y="400" text-anchor="middle" font-family="Arial, sans-serif" font-size="36" fill="#e5af43">★ 4.8</text>
  <text x="600" y="435" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#faf3e0" opacity="0.6">129+ Reviews on OpenTable | Diners' Choice Award</text>
  <!-- Cuisine -->
  <text x="600" y="490" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#faf3e0" opacity="0.7">American · Greek · Mediterranean</text>
  <!-- Address -->
  <text x="600" y="540" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#faf3e0" opacity="0.5">2104 W Algonquin Rd, Lake in the Hills, IL 60156</text>
  <text x="600" y="570" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#faf3e0" opacity="0.5">(224) 333-0035</text>
</svg>
